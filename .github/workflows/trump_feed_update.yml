name: Update Trump Feed

# Every 4 hours (6 times/day). Also supports manual dispatch.
on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trigger:
    name: Update Trump signals and save to file
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Call Vercel update-trump endpoint
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://${{ secrets.VERCEL_URL }}/api/update-trump" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 55)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response preview: ${BODY:0:200}"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::update-trump returned non-200: $HTTP_CODE"
            exit 1
          fi

          echo "$BODY" > /tmp/trump_response.json

          python3 << 'PYEOF'
          import json, os
          with open('/tmp/trump_response.json', encoding='utf-8') as f:
              data = json.load(f)
          if data.get('skipped'):
              print('Skipped (rate limited):', data.get('reason', ''))
          else:
              log = data.get('log')
              if not log:
                  print('WARNING: no log field, keys:', list(data.keys()))
              else:
                  os.makedirs('output', exist_ok=True)
                  with open('output/trump_signals.json', 'w', encoding='utf-8') as f:
                      json.dump(log, f, ensure_ascii=False, indent=2)
                  print('Saved output/trump_signals.json, posts:', len(log.get('posts', [])), 'deltas:', len(log.get('deltas', [])))
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/trump_signals.json
          git diff --staged --quiet && echo "No changes to commit" || \
            (git commit -m "chore: update trump_signals.json [skip ci]" && git push)