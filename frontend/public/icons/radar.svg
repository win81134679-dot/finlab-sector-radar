<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#09090b"/>

  <!-- Radar rings -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.25"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.35"/>
  <circle cx="256" cy="256" r="90"  fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.45"/>
  <circle cx="256" cy="256" r="40"  fill="none" stroke="#d4af37" stroke-width="2"   opacity="0.7"/>

  <!-- Cross hairs -->
  <line x1="256" y1="66"  x2="256" y2="446" stroke="#d4af37" stroke-width="1" opacity="0.2"/>
  <line x1="66"  y1="256" x2="446" y2="256" stroke="#d4af37" stroke-width="1" opacity="0.2"/>

  <!-- Radar sweep (sector arc) -->
  <path d="M256,256 L256,66 A190,190 0 0,1 436.5,321 Z"
        fill="url(#sweep)" opacity="0.55"/>

  <!-- Sweep gradient -->
  <defs>
    <radialGradient id="sweep" cx="0%" cy="0%" r="100%">
      <stop offset="0%"   stop-color="#d4af37" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <!-- Blips on radar -->
  <circle cx="310" cy="170" r="6" fill="#d4af37" opacity="0.9"/>
  <circle cx="310" cy="170" r="12" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.4"/>

  <circle cx="360" cy="290" r="5" fill="#d4af37" opacity="0.75"/>
  <circle cx="360" cy="290" r="10" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

  <circle cx="200" cy="310" r="4" fill="#d4af37" opacity="0.6"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="5" fill="#d4af37" opacity="1"/>
</svg>
